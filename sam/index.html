<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#171019">
<title>Sam's Log</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23171019'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='%23ec4899' font-family='Arial Black'%3ESL%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg:#171019; --panel:#211826; --panel2:#2a1f30; --border:#41334b;
    --text:#efe9f2; --dim:#a898b3; --faint:#71627d;
    --accent:#ec4899; --accent-soft:#f9a8d4; --green:#6ee7b7; --red:#fb7185;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system, system-ui, sans-serif;
    padding-bottom:calc(96px + env(safe-area-inset-bottom));
  }
  .disp { font-family:'Avenir Next Condensed','Arial Narrow',system-ui,sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
  header {
    position:sticky; top:0; z-index:10; background:var(--bg);
    padding:calc(16px + env(safe-area-inset-top)) 16px 0; border-bottom:1px solid var(--border);
  }
  .hrow { display:flex; justify-content:space-between; align-items:flex-end; }
  h1 { margin:0; font-size:24px; color:#fdf4f9; }
  .weekbadge { font-size:12px; color:var(--dim); font-variant-numeric:tabular-nums; }
  .tabs { display:flex; gap:4px; margin-top:12px; }
  .tabs button {
    padding:10px 18px; border:none; border-radius:8px 8px 0 0; font-size:13px;
    background:var(--panel); color:var(--faint); cursor:pointer;
  }
  .tabs button.on { background:var(--accent); color:#1a0a12; }
  main { padding:16px; max-width:640px; margin:0 auto; }
  .upnext { margin:0 0 12px; font-size:14px; color:var(--dim); }
  .upnext b { color:var(--accent); }
  .wpick { display:flex; gap:8px; margin-bottom:16px; }
  .wpick button {
    flex:1; padding:12px 0; border-radius:10px; border:1px solid var(--border);
    background:var(--panel); color:var(--text); cursor:pointer;
  }
  .wpick button.on { border-color:var(--accent); }
  .wpick .big { font-size:18px; }
  .wpick button.on .big { color:var(--accent); }
  .wpick .tag { font-size:9px; letter-spacing:.2em; color:var(--faint); margin-top:2px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:12px; }
  .card.done { border-color:#065f46; }
  .warm { background:var(--panel2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:12px; }
  .warm h3 { margin:0 0 6px; font-size:12px; letter-spacing:.14em; color:var(--accent-soft); }
  .warm ul { margin:0; padding-left:16px; font-size:13px; color:var(--dim); line-height:1.55; }
  .exhead { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:2px; }
  .exname { font-size:16px; color:#fdf4f9; }
  .exrange { font-size:11px; color:var(--faint); font-variant-numeric:tabular-nums; white-space:nowrap; margin-left:8px; }
  .exnote { font-size:11.5px; color:var(--accent-soft); margin:0 0 8px; }
  .chip { border-radius:8px; padding:8px 10px; font-size:13px; line-height:1.4; margin-bottom:12px; border:1px solid var(--border); background:var(--panel2); color:#c9bfd1; }
  .chip.add { background:#2f0d1e; border-color:#9d2463; color:var(--accent-soft); }
  .chip .lbl { font-size:10px; letter-spacing:.12em; margin-right:6px; }
  .chip .last { display:block; font-size:11px; color:var(--faint); margin-top:3px; }
  .setrow { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .setlbl { font-size:10px; color:var(--faint); width:36px; letter-spacing:.08em; }
  .step { display:flex; align-items:center; gap:3px; }
  .step button {
    width:36px; height:44px; border-radius:8px; border:1px solid var(--border);
    background:var(--panel2); color:#d6cbdd; font-size:18px; font-weight:700; cursor:pointer;
  }
  .step button:active { background:#3a2c44; }
  .step input {
    width:58px; height:44px; border-radius:8px; border:1px solid var(--border);
    background:var(--bg); color:#fdf4f9; text-align:center; font-size:16px; font-weight:600;
  }
  .step input:focus { outline:none; border-color:var(--accent); }
  .unit { font-size:11px; color:var(--faint); }
  .prefill { background:none; border:none; color:var(--accent); font-size:12px; text-decoration:underline; padding:2px 0; cursor:pointer; }
  .addset {
    width:100%; height:40px; margin-top:2px; border-radius:8px;
    border:1px dashed var(--border); background:none; color:var(--dim); font-size:13px; cursor:pointer;
  }
  .addset:active { border-color:var(--accent); color:var(--accent); }
  .savebtn {
    position:fixed; bottom:calc(16px + env(safe-area-inset-bottom)); left:16px; right:16px;
    max-width:608px; margin:0 auto; height:56px; border-radius:14px; border:none;
    background:var(--accent); color:#1a0a12; font-size:17px; cursor:pointer;
    box-shadow:0 4px 20px rgba(0,0,0,.5);
  }
  .savebtn:active { background:#f472b6; }
  .yogabtn {
    width:100%; height:56px; border-radius:14px; border:none; margin-top:8px;
    background:var(--accent); color:#1a0a12; font-size:17px; cursor:pointer;
  }
  h2.sect { font-size:12px; letter-spacing:.15em; color:var(--faint); margin:20px 0 8px; }
  .selhint { font-size:11px; color:var(--faint); margin:0 0 6px; }
  .selwrap { position:relative; margin-bottom:12px; }
  select {
    width:100%; height:44px; border-radius:10px; border:1px solid var(--accent);
    background:var(--panel); color:var(--text); padding:0 40px 0 12px; font-size:15px; font-weight:600;
    -webkit-appearance:none;
  }
  .selwrap:after {
    content:"\25BE"; position:absolute; right:14px; top:50%; transform:translateY(-50%);
    color:var(--accent); font-size:16px; pointer-events:none;
  }
  .chartbox { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:10px; margin-bottom:16px; }
  .histrow { display:flex; justify-content:space-between; font-size:13px; padding:7px 2px; border-bottom:1px solid #2c2133; }
  .histrow .d { color:var(--faint); }
  .histrow .v { font-variant-numeric:tabular-nums; color:#e5dcea; }
  .sessrow {
    display:flex; justify-content:space-between; align-items:center;
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:10px 12px; margin-bottom:8px;
  }
  .sessrow .meta { font-size:11px; color:var(--faint); margin-left:8px; }
  .del { background:none; border:none; color:var(--faint); font-size:17px; padding:4px 8px; cursor:pointer; }
  .rowbtns { display:flex; gap:8px; margin:8px 0 24px; }
  .rowbtns button {
    flex:1; height:44px; border-radius:10px; border:1px solid var(--border);
    background:var(--panel); color:var(--dim); font-size:13px; cursor:pointer;
  }
  .syncbox { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:16px; }
  .syncbox input {
    width:100%; height:44px; border-radius:8px; border:1px solid var(--border);
    background:var(--bg); color:var(--text); padding:0 10px; font-size:14px; margin-bottom:8px;
  }
  .syncbox input:focus { outline:none; border-color:var(--accent); }
  .syncstat { font-size:11px; color:var(--faint); margin:4px 0 0; }
  .syncstat.ok { color:var(--green); }
  .syncstat.err { color:var(--red); }
  .toast {
    position:fixed; bottom:calc(88px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    background:#fdf4f9; color:#1a0a12; font-size:13px; font-weight:600;
    padding:8px 16px; border-radius:999px; box-shadow:0 4px 16px rgba(0,0,0,.5); z-index:50; white-space:nowrap;
  }
  .empty { color:var(--faint); font-size:13px; }
  svg text { font-family:-apple-system,system-ui,sans-serif; }
</style>
</head>
<body>
<header>
  <div class="hrow">
    <h1 class="disp">Sam's Log</h1>
    <span class="weekbadge" id="weekbadge"></span>
  </div>
  <div class="tabs">
    <button class="disp on" id="tab-train" onclick="setTab('train')">Train</button>
    <button class="disp" id="tab-progress" onclick="setTab('progress')">Progress</button>
  </div>
</header>
<main id="main"></main>

<script>
"use strict";
// ---------------- Program: Samantha ----------------
const slug = s => s.toLowerCase().replace(/[^a-z0-9]+/g,"-");
// bw=true: bodyweight/timed movement — tracks reps or seconds, no weight required
const ex = (name,min,max,sets,note,bw,unit)=>({id:slug(name),name,min,max,sets:sets||3,note:note||"",bw:!!bw,unit:unit||"reps"});
const WORKOUTS = {
  A:{label:"Day A",tag:"STRENGTH",exercises:[
    ex("Leg Press",10,12,3,"Pain-free depth only \u2014 never push into knee pain"),
    ex("Seated Leg Curl",12,15,3),
    ex("Chest Press",8,10,3),
    ex("Lat Pulldown",8,10,3),
    ex("Cable Row",10,12,3),
    ex("DB Romanian Deadlift",8,10,3,"Hip hinge, keep it light"),
    ex("Plank",30,45,3,"",true,"sec"),
  ]},
  B:{label:"Day B",tag:"STRENGTH",exercises:[
    ex("Hip Thrust",10,12,3),
    ex("Leg Extension",12,15,3,"Light\u2013moderate. If the knee flares, swap for wall sits 3\u00D720\u201330s"),
    ex("Shoulder Press",8,10,3),
    ex("Single-Arm DB Row",10,12,3,"Reps per arm"),
    ex("Incline Chest Press",8,10,3),
    ex("Dead Bug",8,10,3,"Reps per side",true,"reps"),
  ]},
  Y:{label:"Hot Yoga",tag:"RECOVERY",exercises:[]}
};
const WARMUP = [
  "Bike or incline walk \u2014 3 min easy",
  "Banded lateral walks \u2014 2\u00D710 per side",
  "Bodyweight glute bridges \u2014 2\u00D712",
  "Bodyweight squats, pain-free range \u2014 1\u00D710",
];
const WEEK_TARGET = 4;
const INC = 5;
const KEY = "iron-log-sam-v1";

// ---------------- Auto-select: opposite of last completed strength day ----------------
function nextStrength(){
  for (let i=sessions.length-1;i>=0;i--){
    const w = sessions[i].workout;
    if (w==="A") return "B";
    if (w==="B") return "A";
  }
  return "A";
}

// ---------------- Cloud sync: shared private repo, separate file ----------------
const SYNC_KEY = "iron-log-sam-sync";
const SYNC_FILE = "iron-log-sam.json";
let sync = {token:"", repo:"", last:""};
try { const r = localStorage.getItem(SYNC_KEY); if (r) sync = Object.assign(sync, JSON.parse(r)); } catch(e){}
function saveSyncCfg(){
  sync.token = document.getElementById("gh_token").value.trim();
  sync.repo  = document.getElementById("gh_repo").value.trim();
  try { localStorage.setItem(SYNC_KEY, JSON.stringify(sync)); } catch(e){}
  toast(sync.token && sync.repo ? "Sync configured." : "Sync cleared.");
  render();
}
function b64(str){ return btoa(unescape(encodeURIComponent(str))); }
function unb64(str){ return decodeURIComponent(escape(atob(str))); }
function ghUrl(){ return "https://api.github.com/repos/"+sync.repo+"/contents/"+SYNC_FILE; }
function ghHeaders(){ return {"Authorization":"Bearer "+sync.token,"Accept":"application/vnd.github+json"}; }
async function cloudBackup(silent){
  if (!sync.token || !sync.repo) { if(!silent) toast("Set up sync first."); return; }
  try {
    let sha = null;
    const g = await fetch(ghUrl(), {headers: ghHeaders()});
    if (g.status === 200) sha = (await g.json()).sha;
    else if (g.status !== 404) throw new Error("read "+g.status);
    const body = {message:"backup "+new Date().toISOString(), content:b64(JSON.stringify({sessions}))};
    if (sha) body.sha = sha;
    const p = await fetch(ghUrl(), {method:"PUT", headers: ghHeaders(), body: JSON.stringify(body)});
    if (!p.ok) throw new Error("write "+p.status);
    sync.last = new Date().toISOString();
    try { localStorage.setItem(SYNC_KEY, JSON.stringify(sync)); } catch(e){}
    if (!silent){ toast("Backed up to GitHub."); render(); }
  } catch(e){
    if (!silent) toast("Backup failed \u2014 check token/repo.");
    else toast("Auto-backup failed (data saved locally).");
  }
}
async function cloudRestore(){
  if (!sync.token || !sync.repo) { toast("Set up sync first."); return; }
  try {
    const g = await fetch(ghUrl(), {headers: ghHeaders()});
    if (g.status === 404) { toast("No cloud backup found yet."); return; }
    if (!g.ok) throw new Error(g.status);
    const data = await g.json();
    const p = JSON.parse(unb64(data.content.replace(/\n/g,"")));
    if (!Array.isArray(p.sessions)) throw 0;
    const ids = new Set(sessions.map(s=>s.id));
    let added = 0;
    p.sessions.forEach(s=>{ if(!ids.has(s.id)){ sessions.push(s); added++; } });
    sessions.sort((a,b)=>a.id-b.id);
    persist();
    toast("Restored \u2014 "+added+" sessions merged.");
    render();
  } catch(e){ toast("Restore failed \u2014 check token/repo."); }
}

// ---------------- State ----------------
let sessions = [];
try { const raw = localStorage.getItem(KEY); if (raw) { const p = JSON.parse(raw); if (Array.isArray(p.sessions)) sessions = p.sessions; } } catch(e){}
let tab = "train";
let workoutId = nextStrength();
let values = {};
let progressEx = "leg-press";
function persist(){ try { localStorage.setItem(KEY, JSON.stringify({sessions})); } catch(e){ toast("Storage failed \u2014 device may be full."); } }

// ---------------- Helpers ----------------
const fmtDate = iso => new Date(iso).toLocaleDateString(undefined,{month:"short",day:"numeric"});
function weekKey(iso){ const d=new Date(iso); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); d.setHours(0,0,0,0); return d.toISOString().slice(0,10); }
function lastEntryFor(exId){
  for (let i=sessions.length-1;i>=0;i--){
    const sets = sessions[i].entries && sessions[i].entries[exId];
    if (sets && sets.some(s=>s.r>0)) return {sets:sets.filter(s=>s.r>0), date:sessions[i].date};
  }
  return null;
}
function suggest(e, last){
  const u = e.unit==="sec" ? "sec" : "reps";
  if (!last) return {mode:"baseline", weight:0, text:"First session \u2014 set a baseline you can hit for "+e.min+"\u2013"+e.max+" clean "+u+"."};
  const topW = Math.max(...last.sets.map(s=>s.w||0));
  if (last.sets.every(s=>s.r>=e.max)){
    if (e.bw) return {mode:"add", weight:0, text:"Hit "+e.max+"+ "+u+" every set. Push past "+e.max+" or add difficulty."};
    return {mode:"add", weight:topW+INC, text:"Hit "+e.max+"+ on all sets last time. Load "+(topW+INC)+" lb, target "+e.min+" reps."};
  }
  const beat = last.sets.map(s=>Math.min(s.r+1,e.max));
  const at = e.bw ? "" : "Stay at "+topW+" lb. ";
  return {mode:"beat", weight:topW, text:at+"Beat last: "+last.sets.map(s=>s.r).join(" / ")+" \u2192 "+beat.join(" / ")+"."};
}
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
let toastTimer=null;
function toast(msg){
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t);
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.remove(),2500);
}
function findEx(exId){ return Object.values(WORKOUTS).flatMap(w=>w.exercises).find(x=>x.id===exId); }

// ---------------- Render ----------------
function setTab(t){ tab=t; document.getElementById("tab-train").className="disp"+(t==="train"?" on":""); document.getElementById("tab-progress").className="disp"+(t==="progress"?" on":""); render(); }
function setWorkout(id){ workoutId=id; values={}; render(); }
function updateWeekBadge(){
  const k = weekKey(new Date().toISOString());
  const n = sessions.filter(s=>weekKey(s.date)===k).length;
  document.getElementById("weekbadge").textContent = n+"/"+WEEK_TARGET+" sessions this week";
}
function render(){
  updateWeekBadge();
  document.getElementById("main").innerHTML = tab==="train" ? renderTrain() : renderProgress();
}

function renderTrain(){
  const nxt = nextStrength();
  let h = '<p class="upnext">Up next: <b>Day '+nxt+'</b>'+(workoutId===nxt?'':' \u2014 you\u2019ve switched to '+(WORKOUTS[workoutId]?WORKOUTS[workoutId].label:workoutId))+'</p>';
  h += '<div class="wpick">';
  for (const [id,wk] of Object.entries(WORKOUTS))
    h += '<button class="'+(id===workoutId?"on":"")+'" onclick="setWorkout(\''+id+'\')"><div class="big disp">'+esc(wk.label)+'</div><div class="tag">'+wk.tag+'</div></button>';
  h += '</div>';

  if (workoutId === "Y"){
    h += '<div class="card"><div class="exhead"><span class="exname disp">Hot Yoga</span></div>';
    h += '<div class="chip">Recovery and mobility day. One rule that matters more on your protocol, not less: <b>hydrate and take electrolytes before and after</b> \u2014 appetite suppression plus heavy sweating is an easy way to end up depleted.</div>';
    h += '<button class="yogabtn disp" onclick="logYoga()">Mark yoga complete</button></div>';
    return h;
  }

  h += '<div class="warm"><h3 class="disp">Warm-up \u2014 every strength day</h3><ul>';
  for (const w of WARMUP) h += '<li>'+esc(w)+'</li>';
  h += '</ul></div>';

  const w = WORKOUTS[workoutId];
  for (const e of w.exercises){
    const rows = values[e.id] || Array.from({length:e.sets},()=>({w:"",r:""}));
    const done = rows.every(s=>Number(s.r)>0 && (e.bw || Number(s.w)>0));
    const last = lastEntryFor(e.id);
    const sug = suggest(e,last);
    h += '<div class="card'+(done?" done":"")+'">';
    h += '<div class="exhead"><span class="exname disp">'+esc(e.name)+'</span><span class="exrange">'+e.sets+'\u00D7'+e.min+'\u2013'+e.max+(e.unit==="sec"?"s":"")+'</span></div>';
    if (e.note) h += '<p class="exnote">'+esc(e.note)+'</p>';
    h += '<div class="chip'+(sug.mode==="add"?" add":"")+'"><span class="lbl disp">'+(sug.mode==="add"?"\u25B2 Progress":sug.mode==="beat"?"Beat":"Baseline")+'</span>'+esc(sug.text);
    if (last) h += '<span class="last">Last: '+last.sets.map(s=>(e.bw? s.r : s.w+"\u00D7"+s.r)).join(", ")+' ('+fmtDate(last.date)+')</span>';
    h += '</div>';
    rows.forEach((row,i)=>{
      h += '<div class="setrow"><span class="setlbl">SET '+(i+1)+'</span>';
      if (!e.bw) h += stepper(e.id,i,"w",row.w,5)+'<span class="unit">lb</span>';
      h += stepper(e.id,i,"r",row.r,e.unit==="sec"?5:1)+'<span class="unit">'+(e.unit==="sec"?"sec":"reps")+'</span></div>';
    });
    if (!e.bw && sug.mode!=="baseline" && sug.weight>0 && rows.every(s=>s.w===""))
      h += '<button class="prefill" onclick="prefill(\''+e.id+'\','+sug.weight+','+rows.length+')">Prefill '+sug.weight+' lb</button>';
    if (rows.length < 6)
      h += '<button class="addset" onclick="addSet(\''+e.id+'\')">+ Add set</button>';
    h += '</div>';
  }
  h += '<button class="savebtn disp" onclick="saveSession()">Save '+w.label+'</button>';
  return h;
}

function stepper(exId,i,f,val,step){
  const id = exId+"_"+i+"_"+f;
  return '<span class="step">'
    + '<button onclick="bump(\''+exId+'\','+i+',\''+f+'\',-'+step+')">\u2212</button>'
    + '<input id="'+id+'" inputmode="decimal" value="'+esc(val)+'" onchange="typed(\''+exId+'\','+i+',\''+f+'\',this.value)">'
    + '<button onclick="bump(\''+exId+'\','+i+',\''+f+'\','+step+')">+</button></span>';
}
function ensureRows(exId){
  if (!values[exId]){
    const e = findEx(exId);
    values[exId] = Array.from({length:e.sets},()=>({w:"",r:""}));
  }
}
function bump(exId,i,f,d){
  ensureRows(exId);
  const cur = Number(values[exId][i][f])||0;
  values[exId][i][f] = String(Math.max(0,cur+d));
  const inp = document.getElementById(exId+"_"+i+"_"+f);
  if (inp) inp.value = values[exId][i][f];
}
function typed(exId,i,f,v){
  ensureRows(exId);
  values[exId][i][f] = /^\d*\.?\d*$/.test(v) ? v : "";
}
function addSet(exId){
  ensureRows(exId);
  if (values[exId].length >= 6) return;
  values[exId].push({w:"",r:""});
  render();
}
function prefill(exId,wt,n){
  values[exId] = Array.from({length:n},()=>({w:String(wt),r:""}));
  render();
}

function saveSession(){
  const w = WORKOUTS[workoutId];
  const entries = {}; let logged=0;
  for (const e of w.exercises){
    const rows = values[e.id]; if (!rows) continue;
    const clean = rows.map(s=>({w:Number(s.w)||0,r:Number(s.r)||0})).filter(s=>s.r>0 && (e.bw || s.w>0));
    if (clean.length){ entries[e.id]=clean; logged++; }
  }
  if (!logged){ toast("Nothing to save \u2014 log at least one set."); return; }
  sessions.push({id:Date.now(), date:new Date().toISOString(), workout:workoutId, entries});
  persist(); values={};
  toast("Saved \u2014 "+logged+" exercises logged.");
  workoutId = nextStrength();
  render();
  cloudBackup(true);
}
function logYoga(){
  sessions.push({id:Date.now(), date:new Date().toISOString(), workout:"Y", entries:{}});
  persist();
  toast("Yoga logged. Hydrate.");
  render();
  cloudBackup(true);
}
function deleteSession(id){
  sessions = sessions.filter(s=>s.id!==id);
  persist(); toast("Session deleted."); render();
  cloudBackup(true);
}

// ---------------- Progress ----------------
function allExercises(){
  const m = new Map();
  Object.values(WORKOUTS).forEach(w=>w.exercises.forEach(e=>m.set(e.id,e.name)));
  return [...m.entries()].map(([id,name])=>({id,name}));
}
function setProgressEx(v){ progressEx=v; render(); }

function svgBars(data){
  if (!data.length) return '<p class="empty">No sessions yet. Log a workout and this fills in.</p>';
  const W=560,H=150,pad=30, max=Math.max(...data.map(d=>d.value),1);
  const bw = Math.min(48,(W-pad)/data.length*0.6), gap=(W-pad)/data.length;
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="160">';
  data.forEach((d,i)=>{
    const h=(d.value/max)*(H-40), x=pad+i*gap+(gap-bw)/2, y=H-25-h;
    s+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+h+'" rx="4" fill="#ec4899"/>';
    s+='<text x="'+(x+bw/2)+'" y="'+(H-10)+'" font-size="10" fill="#a898b3" text-anchor="middle">'+esc(d.label)+'</text>';
    s+='<text x="'+(x+bw/2)+'" y="'+(y-4)+'" font-size="9" fill="#d6cbdd" text-anchor="middle">'+(d.value>=1000?(d.value/1000).toFixed(1)+"k":d.value)+'</text>';
  });
  return s+'</svg>';
}
function svgLine(data){
  if (!data.length) return '<p class="empty">No data for this exercise yet.</p>';
  const W=560,H=150,padL=34,padR=10,padT=12,padB=22;
  const vals=data.map(d=>d.value);
  let mn=Math.min(...vals), mx=Math.max(...vals);
  if (mn===mx){ mn-=5; mx+=5; }
  const X=i=>data.length===1?W/2:padL+i*(W-padL-padR)/(data.length-1);
  const Y=v=>padT+(1-(v-mn)/(mx-mn))*(H-padT-padB);
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="160">';
  s+='<text x="4" y="'+(Y(mx)+4)+'" font-size="10" fill="#a898b3">'+mx+'</text>';
  s+='<text x="4" y="'+(Y(mn)+4)+'" font-size="10" fill="#a898b3">'+mn+'</text>';
  let path='';
  data.forEach((d,i)=>{ path+=(i?"L":"M")+X(i)+" "+Y(d.value)+" "; });
  s+='<path d="'+path+'" fill="none" stroke="#ec4899" stroke-width="2.5"/>';
  data.forEach((d,i)=>{
    s+='<circle cx="'+X(i)+'" cy="'+Y(d.value)+'" r="3.5" fill="#ec4899"/>';
    s+='<text x="'+X(i)+'" y="'+(H-6)+'" font-size="9" fill="#a898b3" text-anchor="middle">'+esc(d.label)+'</text>';
  });
  return s+'</svg>';
}

function renderProgress(){
  const byWeek={};
  for (const s of sessions){
    const k=weekKey(s.date); let vol=0;
    Object.values(s.entries||{}).forEach(sets=>sets.forEach(x=>{vol+=(x.w||0)*x.r;}));
    byWeek[k]=(byWeek[k]||0)+vol;
  }
  const weeks = Object.entries(byWeek).sort((a,b)=>a[0].localeCompare(b[0])).slice(-8)
    .map(([k,v])=>({label:fmtDate(k),value:Math.round(v)}));

  const pe = findEx(progressEx);
  const hist=[];
  for (const s of sessions){
    const sets = s.entries && s.entries[progressEx];
    if (sets && sets.length){
      const val = (pe && pe.bw) ? Math.max(...sets.map(x=>x.r)) : Math.max(...sets.map(x=>x.w||0));
      hist.push({label:fmtDate(s.date), value:val, raw:sets});
    }
  }

  let h='<h2 class="sect disp">Weekly volume (lb)</h2><div class="chartbox">'+svgBars(weeks)+'</div>';
  h+='<h2 class="sect disp">Exercise trend \u2014 '+((pe&&pe.bw)?"best set ("+pe.unit+")":"top set (lb)")+'</h2>';
  h+='<p class="selhint">Tap to switch lift</p>';
  h+='<div class="selwrap"><select onchange="setProgressEx(this.value)">';
  for (const e of allExercises()) h+='<option value="'+e.id+'"'+(e.id===progressEx?" selected":"")+'>'+esc(e.name)+'</option>';
  h+='</select></div><div class="chartbox">'+svgLine(hist.slice(-12))+'</div>';
  if (hist.length){
    h+='<div style="margin-bottom:16px">';
    hist.slice(-6).reverse().forEach(r=>{
      h+='<div class="histrow"><span class="d">'+esc(r.label)+'</span><span class="v">'+r.raw.map(s=>((pe&&pe.bw)? s.r : s.w+"\u00D7"+s.r)).join("&nbsp;&nbsp;")+'</span></div>';
    });
    h+='</div>';
  }
  h+='<h2 class="sect disp">Cloud sync \u2014 private GitHub repo</h2>';
  h+='<div class="syncbox">';
  h+='<input id="gh_repo" placeholder="Repo (e.g. JCFrith/iron-log-data)" value="'+esc(sync.repo)+'" autocapitalize="off" autocorrect="off">';
  h+='<input id="gh_token" type="password" placeholder="GitHub token" value="'+esc(sync.token)+'" autocapitalize="off" autocorrect="off">';
  h+='<div class="rowbtns" style="margin:4px 0 0">'
    +'<button onclick="saveSyncCfg()">Save config</button>'
    +'<button onclick="cloudBackup(false)">Backup now</button>'
    +'<button onclick="cloudRestore()">Restore</button></div>';
  h+='<p class="syncstat'+(sync.last?" ok":"")+'">'+(sync.last?("Last backup: "+new Date(sync.last).toLocaleString()):"Not configured \u2014 backs up automatically after every saved workout once set up.")+'</p>';
  h+='</div>';
  h+='<h2 class="sect disp">Manual backup</h2><div class="rowbtns">'
    +'<button onclick="exportData()">Export JSON</button>'
    +'<button onclick="document.getElementById(\'importfile\').click()">Import JSON</button>'
    +'<input type="file" id="importfile" accept=".json,application/json" style="display:none" onchange="importData(this)"></div>';
  h+='<h2 class="sect disp">Session history</h2>';
  if (!sessions.length) h+='<p class="empty">Empty log. Go train.</p>';
  [...sessions].reverse().slice(0,15).forEach(s=>{
    const n = Object.keys(s.entries).length;
    h+='<div class="sessrow"><div><span class="disp">'+(WORKOUTS[s.workout]?WORKOUTS[s.workout].label:esc(s.workout))+'</span>'
      +'<span class="meta">'+fmtDate(s.date)+(s.workout==="Y"?"":" \u00B7 "+n+" exercises")+'</span></div>'
      +'<button class="del" onclick="deleteSession('+s.id+')">\u2715</button></div>';
  });
  return h;
}

// ---------------- Manual backup ----------------
function exportData(){
  const blob = new Blob([JSON.stringify({sessions},null,1)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "sam-log-backup-"+new Date().toISOString().slice(0,10)+".json";
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData(input){
  const f = input.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = () => {
    try {
      const p = JSON.parse(rd.result);
      if (!Array.isArray(p.sessions)) throw 0;
      const ids = new Set(sessions.map(s=>s.id));
      let added=0;
      p.sessions.forEach(s=>{ if(!ids.has(s.id)){ sessions.push(s); added++; } });
      sessions.sort((a,b)=>a.id-b.id);
      persist(); toast("Imported "+added+" sessions."); render();
    } catch(e){ toast("Invalid backup file."); }
  };
  rd.readAsText(f);
  input.value="";
}

render();
</script>
</body>
