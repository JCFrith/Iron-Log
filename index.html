function coach(){return `<section class="page" id="coach"><div class="eye">Coach operating center</div><h1 class="title">Athlete Command</h1><p class="sub">Readiness, compliance, alerts, programming, and notes.</p><div class="grid g12"><section class="card s8"><table class="table"><tr><th>Athlete</th><th>Readiness</th><th>Compliance</th><th>Alert</th></tr><tr><td>Chase Frith</td><td>82%</td><td>94%</td><td>None</td></tr><tr><td>Demo Athlete</td><td>54%</td><td>76%</td><td>Sleep debt</td></tr></table></section><section class="card s4"><h3>Coach note</h3><div class="field"><textarea placeholder="Private coaching note…"></textarea></div><button class="primary" onclick="toastMsg('Coach note queued')">Save note</button></section></div></section>`}
function render(){pages.innerHTML=[dashboard(),workout(),analytics(),nutrition(),body(),trainer(),library(),records(),social(),coach()].join('');nav.innerHTML=N.map(x=>`<button data-p="${x[0]}" class="${S.page===x[0]?'on':''}" onclick="go('${x[0]}')">${x[1]}</button>`).join('');mobile.innerHTML=N.slice(0,6).map(x=>`<button data-p="${x[0]}" class="${S.page===x[0]?'on':''}" onclick="go('${x[0]}')">${x[1]}</button>`).join('')}
function go(p){S.page=p;document.querySelectorAll('.page').forEach(x=>x.classList.toggle('on',x.id===p));document.querySelectorAll('[data-p]').forEach(x=>x.classList.toggle('on',x.dataset.p===p));scrollTo({top:0,behavior:'smooth'})}function toastMsg(m){toast.textContent=m;toast.classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>toast.classList.remove('show'),2100)}function adjust(){missionTitle.textContent='AI-Adjusted Upper Body';missionCopy.textContent='Volume reduced 10% and compound rest extended. Estimated completion is now 54 minutes.';toastMsg('Mission adjusted')}function runCommand(){let q=cmd.value.trim().toLowerCase();if(!q)return;if(q.includes('45')&&q.includes('push')){go('workout');toastMsg('45-minute push mission generated')}else if(q.includes('weak')){go('analytics');toastMsg('Weakest area: lower-body frequency')}else if(q.includes('nutrition')||q.includes('meal'))go('nutrition');else if(q.includes('shoulder')||q.includes('hurt'))toastMsg('Shoulder-safe substitutions applied');else if(q.includes('volume')&&q.includes('20'))toastMsg('Next week volume reduced 20%');else toastMsg('Command applied');cmd.value=''}cmd.addEventListener('keydown',e=>{if(e.key==='Enter')runCommand()});
async function hydrate(){try{let {data:{session}}=await sb.auth.getSession();if(!session){status.textContent='Demo mode · production login preserved on main';return}let u=session.user.id;let [{data:p},{data:w},{data:l}]=await Promise.all([sb.from('profiles').select('*').eq('user_id',u).maybeSingle(),sb.from('whoop_days').select('*').eq('user_id',u).order('day',{ascending:false}).limit(1).maybeSingle(),sb.from('logs').select('data').eq('user_id',u).maybeSingle()]);let n=p?.display_name||session.user.email.split('@')[0];sideName.textContent=n;sideRole.textContent=(p?.is_coach?'Coach + Athlete':'Athlete')+' · Level 18';heroName.textContent=n;if(w?.recovery_score!=null){S.readiness=Math.round(w.recovery_score);rec.textContent=S.readiness+'%';ring.style.setProperty('--v',S.readiness);ring.querySelector('strong').textContent=S.readiness}status.textContent='Supabase + WHOOP synchronized'}catch(e){console.warn(e);status.textContent='Connected · partial data mode'}}render();hydrate();
</script></body></html>
