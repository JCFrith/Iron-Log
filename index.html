<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Iron Log</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230a0a0a'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='%23ea580c' font-family='Arial Black'%3EIL%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg:#0a0a0a; --panel:#171717; --panel2:#1f1f1f; --border:#333;
    --text:#e5e5e5; --dim:#8a8a8a; --faint:#5c5c5c;
    --accent:#ea580c; --accent-dim:#7c2d12; --green:#4ade80; --red:#f87171;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system, system-ui, sans-serif;
    padding-bottom:calc(96px + env(safe-area-inset-bottom));
  }
  .disp { font-family:'Avenir Next Condensed','Arial Narrow',system-ui,sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
  header {
    position:sticky; top:0; z-index:10; background:var(--bg);
    padding:calc(16px + env(safe-area-inset-top)) 16px 0; border-bottom:1px solid var(--border);
  }
  .hrow { display:flex; justify-content:space-between; align-items:flex-end; }
  h1 { margin:0; font-size:24px; color:#fafafa; }
  .weekbadge { font-size:12px; color:var(--dim); font-variant-numeric:tabular-nums; }
  .tabs { display:flex; gap:4px; margin-top:12px; }
  .tabs button {
    padding:10px 18px; border:none; border-radius:8px 8px 0 0; font-size:13px;
    background:var(--panel); color:var(--faint); cursor:pointer;
  }
  .tabs button.on { background:var(--accent); color:#0a0a0a; }
  main { padding:16px; max-width:640px; margin:0 auto; }
  .wpick { display:flex; gap:8px; margin-bottom:16px; }
  .wpick button {
    flex:1; padding:12px 0; border-radius:10px; border:1px solid var(--border);
    background:var(--panel); color:var(--text); cursor:pointer;
  }
  .wpick button.on { border-color:var(--accent); }
  .wpick .big { font-size:20px; }
  .wpick button.on .big { color:var(--accent); }
  .wpick .tag { font-size:9px; letter-spacing:.2em; color:var(--faint); margin-top:2px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:12px; }
  .card.done { border-color:#166534; }
  .exhead { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  .exname { font-size:16px; color:#fafafa; }
  .exrange { font-size:11px; color:var(--faint); font-variant-numeric:tabular-nums; white-space:nowrap; margin-left:8px; }
  .chip { border-radius:8px; padding:8px 10px; font-size:13px; line-height:1.4; margin-bottom:12px; border:1px solid var(--border); background:var(--panel2); color:#bbb; }
  .chip.add { background:#2a1205; border-color:#7c2d12; color:#fdba74; }
  .chip .lbl { font-size:10px; letter-spacing:.12em; margin-right:6px; }
  .chip .last { display:block; font-size:11px; color:var(--faint); margin-top:3px; }
  .setrow { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .setlbl { font-size:10px; color:var(--faint); width:36px; letter-spacing:.08em; }
  .step { display:flex; align-items:center; gap:3px; }
  .step button {
    width:36px; height:44px; border-radius:8px; border:1px solid var(--border);
    background:var(--panel2); color:#ccc; font-size:18px; font-weight:700; cursor:pointer;
  }
  .step button:active { background:#333; }
  .step input {
    width:58px; height:44px; border-radius:8px; border:1px solid var(--border);
    background:var(--bg); color:#fafafa; text-align:center; font-size:16px; font-weight:600;
  }
  .step input:focus { outline:none; border-color:var(--accent); }
  .unit { font-size:11px; color:var(--faint); }
  .prefill { background:none; border:none; color:var(--accent); font-size:12px; text-decoration:underline; padding:2px 0; cursor:pointer; }
  .savebtn {
    position:fixed; bottom:calc(16px + env(safe-area-inset-bottom)); left:16px; right:16px;
    max-width:608px; margin:0 auto; height:56px; border-radius:14px; border:none;
    background:var(--accent); color:#0a0a0a; font-size:17px; cursor:pointer;
    box-shadow:0 4px 20px rgba(0,0,0,.5);
  }
  .savebtn:active { background:#f97316; }
  h2.sect { font-size:12px; letter-spacing:.15em; color:var(--faint); margin:20px 0 8px; }
  select {
    width:100%; height:44px; border-radius:10px; border:1px solid var(--border);
    background:var(--panel); color:var(--text); padding:0 12px; font-size:15px; margin-bottom:12px;
    -webkit-appearance:none;
  }
  .chartbox { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:10px; margin-bottom:16px; }
  .histrow { display:flex; justify-content:space-between; font-size:13px; padding:7px 2px; border-bottom:1px solid #222; }
  .histrow .d { color:var(--faint); }
  .histrow .v { font-variant-numeric:tabular-nums; color:#ddd; }
  .sessrow {
    display:flex; justify-content:space-between; align-items:center;
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:10px 12px; margin-bottom:8px;
  }
  .sessrow .meta { font-size:11px; color:var(--faint); margin-left:8px; }
  .del { background:none; border:none; color:var(--faint); font-size:17px; padding:4px 8px; cursor:pointer; }
  .rowbtns { display:flex; gap:8px; margin:8px 0 24px; }
  .rowbtns button {
    flex:1; height:44px; border-radius:10px; border:1px solid var(--border);
    background:var(--panel); color:var(--dim); font-size:13px; cursor:pointer;
  }
  .toast {
    position:fixed; bottom:calc(88px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    background:#fafafa; color:#0a0a0a; font-size:13px; font-weight:600;
    padding:8px 16px; border-radius:999px; box-shadow:0 4px 16px rgba(0,0,0,.5); z-index:50; white-space:nowrap;
  }
  .empty { color:var(--faint); font-size:13px; }
  svg text { font-family:-apple-system,system-ui,sans-serif; }
  /* v2: schedule strip */
  .sched { display:flex; gap:6px; margin-bottom:14px; }
  .sched .day {
    flex:1; border:1px solid var(--border); border-radius:10px; background:var(--panel);
    padding:7px 0 6px; text-align:center; cursor:pointer;
  }
  .sched .day.today { border-color:var(--accent); background:#1c0f06; }
  .sched .day.rest { opacity:.35; cursor:default; }
  .sched .dname { font-size:9px; letter-spacing:.12em; color:var(--faint); }
  .sched .day.today .dname { color:var(--accent); }
  .sched .dwk { font-size:15px; font-weight:700; color:var(--text); margin-top:1px; }
  .sched .day.today .dwk { color:var(--accent); }
  .sched .alt { font-size:7px; letter-spacing:.1em; color:var(--faint); display:block; }
  /* v2: add-set + obvious selector */
  .addset {
    width:100%; height:40px; margin-top:2px; border-radius:8px;
    border:1px dashed var(--border); background:none; color:var(--dim); font-size:13px; cursor:pointer;
  }
  .addset:active { border-color:var(--accent); color:var(--accent); }
  .selwrap { position:relative; margin-bottom:12px; }
  .selwrap select {
    margin-bottom:0; border-color:var(--accent); font-weight:600; padding-right:40px;
  }
  .selwrap:after {
    content:"\25BE"; position:absolute; right:14px; top:50%; transform:translateY(-50%);
    color:var(--accent); font-size:16px; pointer-events:none;
  }
  .selhint { font-size:11px; color:var(--faint); margin:0 0 6px; }

</style>
</head>
<body>
<header>
  <div class="hrow">
    <h1 class="disp">Iron Log</h1>
    <span class="weekbadge" id="weekbadge"></span>
  </div>
  <div class="tabs">
    <button class="disp on" id="tab-train" onclick="setTab('train')">Train</button>
    <button class="disp" id="tab-progress" onclick="setTab('progress')">Progress</button>
  </div>
</header>
<main id="main"></main>

<script>
"use strict";
// ---------------- Program ----------------
const INC = 5;
const slug = s => s.toLowerCase().replace(/[^a-z0-9]+/g,"-");
const ex = (name,min,max,sets=2)=>({id:slug(name),name,min,max,sets});
const WORKOUTS = {
  A:{label:"Workout A",tag:"HEAVY",exercises:[
    ex("Leg Press",6,8), ex("Seated Leg Curl",8,10), ex("Machine Chest Press",6,8),
    ex("Chest-Supported Row",6,8), ex("Machine Shoulder Press",6,8), ex("Lat Pulldown",6,8),
    ex("Cable Curl",8,12), ex("Tricep Pressdown",8,12), ex("Standing Calf Raise",10,15),
    ex("Hanging Leg Raise",10,15)]},
  B:{label:"Workout B",tag:"HEAVY",exercises:[
    ex("Hack Squat",6,8), ex("Hip Thrust",8,10), ex("Incline Machine Press",6,8),
    ex("Seated Cable Row",6,8), ex("Pull-Up (weighted/assisted)",6,8), ex("Dumbbell Lateral Raise",10,15),
    ex("Machine Preacher Curl",8,12), ex("Overhead Cable Tricep Ext",8,12),
    ex("Seated Calf Raise",10,15), ex("45\u00B0 Back Extension",10,15), ex("Cable Crunch",12,15)]},
  C:{label:"Workout C",tag:"PUMP",exercises:[
    ex("Leg Extension",10,15), ex("Lying Leg Curl",10,15), ex("Pec Deck",10,15),
    ex("Machine Row",10,15), ex("Reverse Pec Deck",10,15), ex("Cable Lateral Raise",12,15),
    ex("Hammer Curl",10,12), ex("Rope Pressdown",10,12), ex("Calf Raise",12,20),
    ex("Ab Machine",12,15)]}
};

// ---------------- Schedule (v2) ----------------
function fridayPick(){
  for (let i=sessions.length-1;i>=0;i--){
    const s=sessions[i];
    if (new Date(s.date).getDay()===5 && (s.workout==="A"||s.workout==="B"))
      return s.workout==="A" ? "B" : "A";
  }
  return "A";
}
function scheduleFor(dow){ // 0=Sun..6=Sat
  return {1:"A",2:"C",3:"B",4:"C",5:fridayPick(),6:null,0:null}[dow];
}
const KEY = "iron-log-v1";

// ---------------- State ----------------
let sessions = [];
try { const raw = localStorage.getItem(KEY); if (raw) { const p = JSON.parse(raw); if (Array.isArray(p.sessions)) sessions = p.sessions; } } catch(e){}
let tab = "train";
let workoutId = scheduleFor(new Date().getDay()) || "A";
let values = {};       // {exId:[{w,r},...]}
let progressEx = "leg-press";

function persist(){ try { localStorage.setItem(KEY, JSON.stringify({sessions})); } catch(e){ toast("Storage failed \u2014 device may be full."); } }

// ---------------- Helpers ----------------
const fmtDate = iso => new Date(iso).toLocaleDateString(undefined,{month:"short",day:"numeric"});
function weekKey(iso){ const d=new Date(iso); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); d.setHours(0,0,0,0); return d.toISOString().slice(0,10); }
function lastEntryFor(exId){
  for (let i=sessions.length-1;i>=0;i--){
    const sets = sessions[i].entries && sessions[i].entries[exId];
    if (sets && sets.some(s=>s.w>0&&s.r>0)) return {sets:sets.filter(s=>s.w>0&&s.r>0), date:sessions[i].date};
  }
  return null;
}
function suggest(e, last){
  if (!last) return {mode:"baseline", text:"First session \u2014 set a baseline you can hit for "+e.min+"\u2013"+e.max+" clean reps."};
  const topW = Math.max(...last.sets.map(s=>s.w));
  if (last.sets.every(s=>s.r>=e.max))
    return {mode:"add", weight:topW+INC, text:"Hit "+e.max+"+ on all sets last time. Load "+(topW+INC)+" lb, target "+e.min+" reps."};
  const beat = last.sets.map(s=>Math.min(s.r+1,e.max));
  return {mode:"beat", weight:topW, text:"Stay at "+topW+" lb. Beat last: "+last.sets.map(s=>s.r).join(" / ")+" \u2192 "+beat.join(" / ")+"."};
}
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
let toastTimer=null;
function toast(msg){
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t);
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.remove(),2500);
}

// ---------------- Render ----------------
function setTab(t){ tab=t; document.getElementById("tab-train").className="disp"+(t==="train"?" on":""); document.getElementById("tab-progress").className="disp"+(t==="progress"?" on":""); render(); }
function setWorkout(id){ workoutId=id; values={}; render(); }

function updateWeekBadge(){
  const k = weekKey(new Date().toISOString());
  const n = sessions.filter(s=>weekKey(s.date)===k).length;
  document.getElementById("weekbadge").textContent = n+"/5 sessions this week";
}

function render(){
  updateWeekBadge();
  document.getElementById("main").innerHTML = tab==="train" ? renderTrain() : renderProgress();
}

function renderTrain(){
  const w = WORKOUTS[workoutId];
  const todayDow = new Date().getDay();
  const days = [["MON",1],["TUE",2],["WED",3],["THU",4],["FRI",5],["SAT",6],["SUN",0]];
  let h = '<div class="sched">';
  for (const [nm,dow] of days){
    const wk = scheduleFor(dow);
    const isToday = dow===todayDow;
    if (wk){
      h += '<div class="day'+(isToday?" today":"")+'" onclick="setWorkout(\''+wk+'\')">'
        +'<div class="dname">'+nm+'</div><div class="dwk disp">'+wk
        +(dow===5?'<span class="alt">ALT</span>':'')+'</div></div>';
    } else {
      h += '<div class="day rest'+(isToday?" today":"")+'"><div class="dname">'+nm+'</div><div class="dwk">\u2013</div></div>';
    }
  }
  h += '</div>';
  h += '<div class="wpick">';
  for (const [id,wk] of Object.entries(WORKOUTS))
    h += '<button class="'+(id===workoutId?"on":"")+'" onclick="setWorkout(\''+id+'\')"><div class="big disp">'+id+'</div><div class="tag">'+wk.tag+'</div></button>';
  h += '</div>';
  for (const e of w.exercises){
    const rows = values[e.id] || Array.from({length:e.sets},()=>({w:"",r:""}));
    const done = rows.every(s=>Number(s.w)>0&&Number(s.r)>0);
    const last = lastEntryFor(e.id);
    const sug = suggest(e,last);
    h += '<div class="card'+(done?" done":"")+'">';
    h += '<div class="exhead"><span class="exname disp">'+esc(e.name)+'</span><span class="exrange">'+e.sets+'\u00D7'+e.min+'\u2013'+e.max+'</span></div>';
    h += '<div class="chip'+(sug.mode==="add"?" add":"")+'"><span class="lbl disp">'+(sug.mode==="add"?"\u25B2 Add weight":sug.mode==="beat"?"Beat":"Baseline")+'</span>'+esc(sug.text);
    if (last) h += '<span class="last">Last: '+last.sets.map(s=>s.w+"\u00D7"+s.r).join(", ")+' ('+fmtDate(last.date)+')</span>';
    h += '</div>';
    rows.forEach((row,i)=>{
      h += '<div class="setrow"><span class="setlbl">SET '+(i+1)+'</span>';
      h += stepper(e.id,i,"w",row.w,5)+'<span class="unit">lb</span>';
      h += stepper(e.id,i,"r",row.r,1)+'<span class="unit">reps</span></div>';
    });
    if (sug.mode!=="baseline" && rows.every(s=>s.w===""))
      h += '<button class="prefill" onclick="prefill(\''+e.id+'\','+sug.weight+','+rows.length+')">Prefill '+sug.weight+' lb</button>';
    if (rows.length < 6)
      h += '<button class="addset" onclick="addSet(\''+e.id+'\')">+ Add set</button>';
    h += '</div>';
  }
  h += '<button class="savebtn disp" onclick="saveSession()">Save '+w.label+'</button>';
  return h;
}

function stepper(exId,i,f,val,step){
  const id = exId+"_"+i+"_"+f;
  return '<span class="step">'
    + '<button onclick="bump(\''+exId+'\','+i+',\''+f+'\',-'+step+')">\u2212</button>'
    + '<input id="'+id+'" inputmode="decimal" value="'+esc(val)+'" onchange="typed(\''+exId+'\','+i+',\''+f+'\',this.value)">'
    + '<button onclick="bump(\''+exId+'\','+i+',\''+f+'\','+step+')">+</button></span>';
}
function ensureRows(exId){
  if (!values[exId]){
    const e = Object.values(WORKOUTS).flatMap(w=>w.exercises).find(x=>x.id===exId);
    values[exId] = Array.from({length:e.sets},()=>({w:"",r:""}));
  }
}
function bump(exId,i,f,d){
  ensureRows(exId);
  const cur = Number(values[exId][i][f])||0;
  values[exId][i][f] = String(Math.max(0,cur+d));
  const inp = document.getElementById(exId+"_"+i+"_"+f);
  if (inp) inp.value = values[exId][i][f];
  refreshCardState(exId);
}
function typed(exId,i,f,v){
  ensureRows(exId);
  values[exId][i][f] = /^\d*\.?\d*$/.test(v) ? v : "";
  refreshCardState(exId);
}
function addSet(exId){
  ensureRows(exId);
  if (values[exId].length >= 6) return;
  values[exId].push({w:"",r:""});
  render();
}
function prefill(exId,wt,sets){
  values[exId] = Array.from({length:sets},()=>({w:String(wt),r:""}));
  render();
}
function refreshCardState(exId){
  // cheap: full rerender only on save; leave inputs as-is to avoid losing focus
}

function saveSession(){
  const w = WORKOUTS[workoutId];
  const entries = {}; let logged=0;
  for (const e of w.exercises){
    const rows = values[e.id]; if (!rows) continue;
    const clean = rows.map(s=>({w:Number(s.w)||0,r:Number(s.r)||0})).filter(s=>s.w>0&&s.r>0);
    if (clean.length){ entries[e.id]=clean; logged++; }
  }
  if (!logged){ toast("Nothing to save \u2014 log at least one set."); return; }
  sessions.push({id:Date.now(), date:new Date().toISOString(), workout:workoutId, entries});
  persist(); values={};
  toast("Saved \u2014 "+logged+" exercises logged.");
  render();
}
function deleteSession(id){
  sessions = sessions.filter(s=>s.id!==id);
  persist(); toast("Session deleted."); render();
}

// ---------------- Progress ----------------
function allExercises(){
  const m = new Map();
  Object.values(WORKOUTS).forEach(w=>w.exercises.forEach(e=>m.set(e.id,e.name)));
  return [...m.entries()].map(([id,name])=>({id,name}));
}
function setProgressEx(v){ progressEx=v; render(); }

function svgBars(data){ // [{label, value}]
  if (!data.length) return '<p class="empty">No sessions yet. Log a workout and this fills in.</p>';
  const W=560,H=150,pad=30, max=Math.max(...data.map(d=>d.value),1);
  const bw = Math.min(48,(W-pad)/data.length*0.6), gap=(W-pad)/data.length;
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="160">';
  data.forEach((d,i)=>{
    const h=(d.value/max)*(H-40), x=pad+i*gap+(gap-bw)/2, y=H-25-h;
    s+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+h+'" rx="4" fill="#ea580c"/>';
    s+='<text x="'+(x+bw/2)+'" y="'+(H-10)+'" font-size="10" fill="#8a8a8a" text-anchor="middle">'+esc(d.label)+'</text>';
    s+='<text x="'+(x+bw/2)+'" y="'+(y-4)+'" font-size="9" fill="#bbb" text-anchor="middle">'+(d.value>=1000?(d.value/1000).toFixed(1)+"k":d.value)+'</text>';
  });
  return s+'</svg>';
}
function svgLine(data){ // [{label, value}]
  if (!data.length) return '<p class="empty">No data for this exercise yet.</p>';
  const W=560,H=150,padL=34,padR=10,padT=12,padB=22;
  const vals=data.map(d=>d.value);
  let mn=Math.min(...vals), mx=Math.max(...vals);
  if (mn===mx){ mn-=5; mx+=5; }
  const X=i=>data.length===1?W/2:padL+i*(W-padL-padR)/(data.length-1);
  const Y=v=>padT+(1-(v-mn)/(mx-mn))*(H-padT-padB);
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="160">';
  s+='<text x="4" y="'+(Y(mx)+4)+'" font-size="10" fill="#8a8a8a">'+mx+'</text>';
  s+='<text x="4" y="'+(Y(mn)+4)+'" font-size="10" fill="#8a8a8a">'+mn+'</text>';
  let path='';
  data.forEach((d,i)=>{ path+=(i?"L":"M")+X(i)+" "+Y(d.value)+" "; });
  s+='<path d="'+path+'" fill="none" stroke="#ea580c" stroke-width="2.5"/>';
  data.forEach((d,i)=>{
    s+='<circle cx="'+X(i)+'" cy="'+Y(d.value)+'" r="3.5" fill="#ea580c"/>';
    s+='<text x="'+X(i)+'" y="'+(H-6)+'" font-size="9" fill="#8a8a8a" text-anchor="middle">'+esc(d.label)+'</text>';
  });
  return s+'</svg>';
}

function renderProgress(){
  // weekly volume
  const byWeek={};
  for (const s of sessions){
    const k=weekKey(s.date); let vol=0;
    Object.values(s.entries||{}).forEach(sets=>sets.forEach(x=>{vol+=x.w*x.r;}));
    byWeek[k]=(byWeek[k]||0)+vol;
  }
  const weeks = Object.entries(byWeek).sort((a,b)=>a[0].localeCompare(b[0])).slice(-8)
    .map(([k,v])=>({label:fmtDate(k),value:Math.round(v)}));

  // exercise history
  const hist=[];
  for (const s of sessions){
    const sets = s.entries && s.entries[progressEx];
    if (sets && sets.length) hist.push({label:fmtDate(s.date), value:Math.max(...sets.map(x=>x.w)), raw:sets, date:s.date});
  }

  let h='<h2 class="sect disp">Weekly volume (lb)</h2><div class="chartbox">'+svgBars(weeks)+'</div>';
  h+='<h2 class="sect disp">Exercise trend \u2014 top set</h2>';
  h+='<p class="selhint">Tap to switch lift</p>';
  h+='<div class="selwrap"><select onchange="setProgressEx(this.value)">';
  for (const e of allExercises()) h+='<option value="'+e.id+'"'+(e.id===progressEx?" selected":"")+'>'+esc(e.name)+'</option>';
  h+='</select></div><div class="chartbox">'+svgLine(hist.slice(-12))+'</div>';
  if (hist.length){
    h+='<div style="margin-bottom:16px">';
    hist.slice(-6).reverse().forEach(r=>{
      h+='<div class="histrow"><span class="d">'+esc(r.label)+'</span><span class="v">'+r.raw.map(s=>s.w+"\u00D7"+s.r).join("&nbsp;&nbsp;")+'</span></div>';
    });
    h+='</div>';
  }
  h+='<h2 class="sect disp">Backup</h2><div class="rowbtns">'
    +'<button onclick="exportData()">Export JSON</button>'
    +'<button onclick="document.getElementById(\'importfile\').click()">Import JSON</button>'
    +'<input type="file" id="importfile" accept=".json,application/json" style="display:none" onchange="importData(this)"></div>';
  h+='<h2 class="sect disp">Session history</h2>';
  if (!sessions.length) h+='<p class="empty">Empty log. Go lift.</p>';
  [...sessions].reverse().slice(0,15).forEach(s=>{
    h+='<div class="sessrow"><div><span class="disp">'+(WORKOUTS[s.workout]?WORKOUTS[s.workout].label:esc(s.workout))+'</span>'
      +'<span class="meta">'+fmtDate(s.date)+' \u00B7 '+Object.keys(s.entries).length+' exercises</span></div>'
      +'<button class="del" onclick="deleteSession('+s.id+')">\u2715</button></div>';
  });
  return h;
}

// ---------------- Backup ----------------
function exportData(){
  const blob = new Blob([JSON.stringify({sessions},null,1)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "iron-log-backup-"+new Date().toISOString().slice(0,10)+".json";
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData(input){
  const f = input.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = () => {
    try {
      const p = JSON.parse(rd.result);
      if (!Array.isArray(p.sessions)) throw 0;
      const ids = new Set(sessions.map(s=>s.id));
      let added=0;
      p.sessions.forEach(s=>{ if(!ids.has(s.id)){ sessions.push(s); added++; } });
      sessions.sort((a,b)=>a.id-b.id);
      persist(); toast("Imported "+added+" sessions."); render();
    } catch(e){ toast("Invalid backup file."); }
  };
  rd.readAsText(f);
  input.value="";
}

render();
</script>
</body>
